name: ALISEE Onda - dashboard

on:
  schedule:
    # Allineato all'uscita delle run del modello d'onda (init 00/06/12/18 UTC,
    # disponibili ~4-5h dopo). Girare piu' spesso riscaricherebbe lo stesso
    # forecast. Per un uso minimale bastano le due principali: 5 e 17 UTC.
    - cron: "0 5,11,17,23 * * *"
  workflow_dispatch: {}          # bottone "Run workflow" manuale

permissions:
  contents: write        # per ricommittare archivio_previsioni.csv a ogni run
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Genera versione pubblica (neutra)
        # Co-branding sulla pagina PUBBLICA: accendere SOLO ad accordo fatto,
        # aggiungendo qui l'env PARTNER come nello step demo qui sotto.
        run: python previsione_onda.py

      - name: Prepara la cartella da pubblicare
        run: |
          mkdir -p site
          cp dashboard.html site/index.html   # pagina pubblica
          cp widget.html    site/widget.html  # widget incorporabile dal cliente
          cp previsione_onda_72h.csv site/ || true

      - name: Genera versione DEMO (tutti i ganci accesi)
        # Pagina di dimostrazione per la trattativa: non e' linkata da nessuna
        # parte, la vede solo chi riceve l'URL. Lo sponsor e' un segnaposto
        # (non si usa il nome di un'azienda reale senza consenso).
        env:
          PARTNER: SurfCam Italia
          CAM_URL: https://surfcamitalia.it/spot/supertubes/
          SPONSOR: il tuo sponsor qui
          NO_ARCHIVIO: "1"    # la demo non archivia: sarebbe un doppione
        run: |
          python previsione_onda.py
          cp dashboard.html site/demo.html
          cp widget.html    site/demo-widget.html

      - name: Salva archivio previsioni nel repo
        # Il runner e' usa-e-getta: senza commit, l'archivio sparirebbe a ogni run.
        run: |
          git config user.name  "alisee-bot"
          git config user.email "bot@alisee.local"
          git pull --rebase origin main || true
          git add archivio_previsioni.csv
          git commit -m "archivio previsioni (run automatica)" || echo "niente di nuovo"
          git push || echo "push archivio saltato"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
